spring.application.name=votacao

server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:votacao}
spring.datasource.username=${DB_USER:votacao}
spring.datasource.password=${DB_PASSWORD:votacao}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.threads.virtual.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:guest}
spring.rabbitmq.password=${RABBIT_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

cpf.validacao.base-url=${URL_CPF_VALIDACAO:https://api.invertexto.com/v1/validator}
cpf.validacao.token=${TOKEN_CPF_VALIDACAO:24718|8g1Unrn4yGz647SIo9StzQbPU8AlSqXp}

sessao.scheduler.delay-ms=30000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.br.com.cooperativismo.votacao=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.hibernate.SQL=WARN
